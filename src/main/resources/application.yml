spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payroll_db
    username: payroll_user
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

logging:
  level:
    com.payroll: DEBUG
    org.hibernate.SQL: DEBUG
