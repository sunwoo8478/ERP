<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>페이핏 스마트폰 시뮬레이터</title>
  <style>
    /* ─── 데스크탑 배경 ─── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d1a 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }

    /* ─── 폰 스케일 래퍼 ─── */
    .phone-scale-wrap {
      /* JS로 transform: scale(N) 주입 */
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── 폰 본체 ─── */
    .phone-body {
      width: 390px; height: 844px;
      background: #1c1c1e;
      border-radius: 54px;
      position: relative;
      flex-shrink: 0;
      box-shadow:
        inset 0 0 0 1px #444,
        inset 0 0 0 2px #2a2a2a,
        0 0 0 1px #111,
        0 30px 80px rgba(0,0,0,.9),
        0 0 40px rgba(255,255,255,.03);
    }
    /* 측면 버튼 */
    .phone-body::before {
      content: '';
      position: absolute; left: -3px; top: 160px;
      width: 3px; height: 36px;
      background: #3a3a3a; border-radius: 2px 0 0 2px;
      box-shadow: 0 50px 0 #3a3a3a, 0 90px 0 #3a3a3a;
    }
    .phone-body::after {
      content: '';
      position: absolute; right: -3px; top: 200px;
      width: 3px; height: 70px;
      background: #3a3a3a; border-radius: 0 2px 2px 0;
    }

    /* ─── 화면 ─── */
    .phone-screen {
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border-radius: 46px;
      overflow: hidden;
      background: #000;
    }

    /* ─── Dynamic Island ─── */
    .dynamic-island {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 37px;
      background: #000; border-radius: 20px;
      z-index: 200; transition: all .3s cubic-bezier(.4,0,.2,1);
    }
    .dynamic-island.expand {
      width: 300px; height: 90px; border-radius: 30px; top: 10px;
    }
    .di-notif {
      display: none; color: #fff; padding: 10px 16px;
      font-size: 13px; align-items: center; gap: 12px;
    }
    .dynamic-island.expand .di-notif { display: flex; }
    .di-icon { font-size: 28px; }
    .di-text .di-title { font-size: 12px; opacity: .7; }
    .di-text .di-amount { font-size: 20px; font-weight: 700; color: #30d158; }

    /* ─── 상태바 ─── */
    .status-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 54px;
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 28px 8px; z-index: 150; pointer-events: none;
      color: #fff; font-size: 15px; font-weight: 600;
    }
    .status-time { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
    .status-icons { display: flex; gap: 6px; align-items: center; font-size: 12px; }

    /* ─── 홈 인디케이터 ─── */
    .home-indicator {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px; background: rgba(255,255,255,.3);
      border-radius: 3px; z-index: 100; cursor: pointer;
    }

    /* ──────────────────────────────
       SCREENS (공통)
    ─────────────────────────────── */
    .screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none; flex-direction: column;
      overflow: hidden;
    }
    .screen.active { display: flex; }
    /* 상태바 아래 앱 헤더 고정 오프셋 */
    .app-top-pad { height: 54px; flex-shrink: 0; }

    /* 앱 전환 애니메이션 */
    .screen.slide-in  { animation: slideIn  .35s cubic-bezier(.4,0,.2,1) forwards; }
    .screen.slide-out { animation: slideOut .3s  cubic-bezier(.4,0,.2,1) forwards; }
    .screen.slide-up   { animation: slideUp  .4s  cubic-bezier(.4,0,.2,1) forwards; }
    .screen.slide-down { animation: slideDown .35s cubic-bezier(.4,0,.2,1) forwards; }

    @keyframes slideIn  { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slideOut { from { transform: translateX(0); }    to { transform: translateX(100%); } }
    @keyframes slideUp  { from { transform: translateY(100%); opacity:0; } to { transform: translateY(0); opacity:1; } }
    @keyframes slideDown { from { transform: translateY(0); opacity:1; } to { transform: translateY(100%); opacity:0; } }

    /* ──────────────────────────────
       잠금 화면
    ─────────────────────────────── */
    #screen-lock {
      background: linear-gradient(160deg, #1a1a3e 0%, #0a2a4a 50%, #1a1a2e 100%);
      color: #fff; align-items: center; justify-content: center;
      gap: 6px; padding-top: 54px;
    }
    .lock-wallpaper {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(100,120,255,.3), transparent 60%),
                  radial-gradient(ellipse at 70% 60%, rgba(50,200,150,.2), transparent 60%);
    }
    .lock-time {
      font-size: 72px; font-weight: 200; letter-spacing: -2px;
      margin-bottom: 4px; text-align: center; position: relative;
    }
    .lock-date { font-size: 18px; opacity: .8; margin-bottom: 60px; position: relative; }
    .lock-hint {
      position: absolute; bottom: 80px;
      font-size: 14px; opacity: .7; text-align: center;
      animation: pulse 2s infinite;
    }
    .faceid-ring {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; cursor: pointer; position: relative;
      transition: all .3s;
    }
    .faceid-ring:hover { border-color: #fff; background: rgba(255,255,255,.1); }
    .faceid-ring.scanning {
      animation: scanRing 1s ease-in-out;
      border-color: #30d158;
    }
    @keyframes scanRing {
      0%   { transform: scale(1);    border-color: rgba(255,255,255,.5); }
      50%  { transform: scale(1.15); border-color: #30d158; box-shadow: 0 0 20px #30d158; }
      100% { transform: scale(1);    border-color: #30d158; }
    }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    /* ──────────────────────────────
       홈 화면
    ─────────────────────────────── */
    #screen-home {
      background: linear-gradient(160deg, #1a1a3e 0%, #0a2a4a 50%, #1a1a2e 100%);
    }
    .home-wallpaper {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(100,120,255,.25), transparent 55%),
                  radial-gradient(ellipse at 70% 65%, rgba(50,200,150,.15), transparent 55%);
    }
    .home-content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: flex-end; padding: 0 20px 10px;
      position: relative; z-index: 1; overflow: hidden;
    }
    .app-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 24px 12px; padding: 20px 8px;
    }
    .app-icon-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer;
    }
    .app-icon {
      width: 64px; height: 64px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; position: relative;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      transition: transform .1s; -webkit-tap-highlight-color: transparent;
    }
    .app-icon:active { transform: scale(.9); }
    .app-icon .badge {
      position: absolute; top: -6px; right: -6px;
      background: #ff3b30; color: #fff; border-radius: 10px;
      padding: 2px 6px; font-size: 11px; font-weight: 700;
      min-width: 20px; text-align: center; display: none;
      border: 2px solid #1a1a2e;
    }
    .app-label { color: rgba(255,255,255,.9); font-size: 11px; font-weight: 500; text-align: center; }
    .dock {
      background: rgba(255,255,255,.12); backdrop-filter: blur(20px);
      border-radius: 28px; margin: 0 12px 20px;
      padding: 14px; display: flex; justify-content: space-around;
      position: relative; z-index: 1;
    }

    /* ──────────────────────────────
       앱 공통 헤더
    ─────────────────────────────── */
    .app-header {
      height: 50px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; flex-shrink: 0;
    }
    .app-header .back-btn {
      background: none; border: none; font-size: 24px; cursor: pointer;
      color: inherit; padding: 0 8px 0 0; line-height: 1;
    }
    .app-header-title { font-size: 16px; font-weight: 700; }
    .app-header .right-btn {
      background: none; border: none; font-size: 22px; cursor: pointer;
      color: inherit; padding: 0;
    }
    .app-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .app-body::-webkit-scrollbar { display: none; }

    /* ──────────────────────────────
       페이핏 앱 (급여 포털)
    ─────────────────────────────── */
    #screen-payfit {
      background: #f0f4ff; color: #1a1a2e;
    }
    #screen-payfit .app-header {
      background: #fff; border-bottom: 1px solid #f0f0f0;
    }
    .payfit-login {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px 24px; overflow-y: auto;
    }
    .payfit-logo { font-size: 48px; margin-bottom: 12px; }
    .payfit-title { font-size: 22px; font-weight: 800; color: #1a73e8; margin-bottom: 6px; }
    .payfit-subtitle { font-size: 13px; color: #888; margin-bottom: 32px; text-align: center; }
    .pf-input-group { width: 100%; margin-bottom: 14px; }
    .pf-input-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
    .pf-input-group input {
      width: 100%; padding: 13px 16px; border: 1.5px solid #e0e7ff; border-radius: 12px;
      font-size: 15px; outline: none; background: #f8faff; color: #1a1a2e;
    }
    .pf-input-group input:focus { border-color: #1a73e8; background: #fff; }
    .pf-btn-login {
      width: 100%; padding: 15px; background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 4px;
    }
    .pf-error { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 8px; display: none; }

    /* 페이핏 메인 */
    .pf-profile { padding: 16px 20px; background: #fff; border-bottom: 1px solid #f5f5f5; }
    .pf-profile-name { font-size: 18px; font-weight: 800; }
    .pf-profile-info { font-size: 12px; color: #888; margin-top: 3px; }
    .pf-hero {
      margin: 16px; border-radius: 20px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      padding: 22px; color: #fff;
    }
    .pf-hero-label { font-size: 12px; opacity: .8; margin-bottom: 6px; }
    .pf-hero-amount { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
    .pf-hero-sub { font-size: 11px; opacity: .7; margin-bottom: 16px; }
    .pf-hero-btn {
      display: inline-block; background: rgba(255,255,255,.25);
      border: 1px solid rgba(255,255,255,.4); color: #fff;
      padding: 7px 16px; border-radius: 20px; font-size: 12px; cursor: pointer;
      font-weight: 600; border-width: 0;
    }
    .pf-section-title { padding: 14px 20px 6px; font-size: 14px; font-weight: 700; }
    .pf-slip-item {
      background: #fff; margin: 0 16px 10px; border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: opacity .1s;
    }
    .pf-slip-item:active { opacity: .7; }
    .pf-slip-icon {
      width: 40px; height: 40px; border-radius: 50%; background: #e6f4ea;
      display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .pf-slip-info { flex: 1; }
    .pf-slip-name { font-size: 14px; font-weight: 600; }
    .pf-slip-date { font-size: 11px; color: #888; margin-top: 2px; }
    .pf-slip-right { text-align: right; }
    .pf-slip-net { color: #00b386; font-weight: 700; font-size: 14px; }
    .pf-slip-gross { color: #aaa; font-size: 11px; }
    .badge-new {
      background: #e8f0fe; color: #1a73e8; font-size: 9px;
      padding: 1px 5px; border-radius: 8px; margin-left: 4px; font-weight: 700;
    }

    /* 페이핏 명세서 */
    .pf-slip-detail { padding: 0 16px 30px; }
    .pf-detail-info { background: #f8f9fa; border-radius: 14px; padding: 14px; margin: 12px 0; }
    .pf-detail-emp { font-size: 16px; font-weight: 700; }
    .pf-detail-sub { font-size: 12px; color: #888; margin-top: 3px; }
    .pf-net-card {
      background: linear-gradient(135deg, #00b386, #00875a);
      border-radius: 16px; padding: 22px; color: #fff; text-align: center; margin-bottom: 14px;
    }
    .pf-net-label { font-size: 12px; opacity: .8; margin-bottom: 5px; }
    .pf-net-amount { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
    .pf-items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .pf-items-card { background: #fff; border-radius: 14px; padding: 12px; }
    .pf-items-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; }
    .pf-item-row { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 5px; }
    .pf-item-total {
      border-top: 1px solid #eee; margin-top: 6px; padding-top: 6px;
      font-size: 12px; font-weight: 700; display: flex; justify-content: space-between;
    }
    .pf-summary { background: #fff; border-radius: 14px; padding: 12px; font-size: 11px; color: #888; line-height: 1.8; }
    .c-red { color: #e74c3c; }

    /* ──────────────────────────────
       핀뱅크 앱
    ─────────────────────────────── */
    #screen-bank { background: #f5f5f7; color: #1a1a2e; }
    #screen-bank .app-header { background: #fff; border-bottom: 1px solid #f0f0f0; }
    .bank-header-logo { font-size: 15px; font-weight: 800; color: #0066cc; letter-spacing: -.3px; }

    .bank-account-card {
      margin: 16px; border-radius: 20px;
      background: linear-gradient(135deg, #0066cc, #004499);
      padding: 22px; color: #fff;
      box-shadow: 0 8px 24px rgba(0,102,204,.4);
    }
    .bank-card-chip { font-size: 22px; margin-bottom: 14px; }
    .bank-card-bank { font-size: 12px; opacity: .8; margin-bottom: 2px; }
    .bank-card-type { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
    .bank-card-acct { font-size: 13px; opacity: .7; letter-spacing: 1px; font-family: monospace; margin-bottom: 16px; }
    .bank-card-balance-label { font-size: 11px; opacity: .7; margin-bottom: 4px; }
    .bank-card-balance { font-size: 30px; font-weight: 800; letter-spacing: -1px; }
    .bank-card-owner { font-size: 12px; opacity: .8; margin-top: 12px; }
    .bank-quick-btns {
      display: flex; gap: 10px; margin: 0 16px 16px;
    }
    .bank-quick-btn {
      flex: 1; background: #fff; border-radius: 12px; padding: 12px 8px;
      text-align: center; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08);
      font-size: 11px; font-weight: 600; color: #333;
    }
    .bank-quick-btn .bqb-icon { font-size: 20px; margin-bottom: 4px; }
    .bank-section-title {
      padding: 4px 20px 8px; font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: space-between;
    }
    .bank-section-title span { font-size: 12px; color: #0066cc; font-weight: 500; cursor: pointer; }
    .bank-tx-item {
      background: #fff; margin: 0 16px 2px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      transition: opacity .1s;
    }
    .bank-tx-item:first-of-type { border-radius: 14px 14px 0 0; }
    .bank-tx-item:last-of-type  { border-radius: 0 0 14px 14px; margin-bottom: 12px; }
    .bank-tx-item:only-child    { border-radius: 14px; }
    .bank-tx-item:active { opacity: .7; }
    .bank-tx-icon {
      width: 40px; height: 40px; border-radius: 50%; background: #e6f4ea;
      display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .bank-tx-icon.new { background: #fff3e0; }
    .bank-tx-info { flex: 1; }
    .bank-tx-desc { font-size: 14px; font-weight: 600; }
    .bank-tx-date { font-size: 11px; color: #888; margin-top: 2px; }
    .bank-tx-right { text-align: right; }
    .bank-tx-amount { font-size: 15px; font-weight: 700; color: #0066cc; }
    .bank-tx-balance { font-size: 11px; color: #aaa; margin-top: 2px; }
    .bank-empty { padding: 40px 20px; text-align: center; color: #aaa; font-size: 14px; }
    .bank-tx-new-badge {
      background: #ff6b00; color: #fff; font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 8px; margin-left: 4px;
    }

    /* 은행 상세 (앱 내 내부 화면) */
    .bank-tx-detail { padding: 0 16px 30px; display: none; }
    .bank-detail-amount-card {
      background: linear-gradient(135deg, #0066cc, #004499);
      border-radius: 16px; padding: 24px; color: #fff; text-align: center; margin: 12px 0;
    }
    .bank-detail-type { font-size: 13px; opacity: .8; margin-bottom: 6px; }
    .bank-detail-amount { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
    .bank-detail-row {
      background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    }
    .bank-detail-item {
      display: flex; justify-content: space-between; padding: 8px 0;
      border-bottom: 1px solid #f5f5f7; font-size: 13px;
    }
    .bank-detail-item:last-child { border-bottom: none; }
    .bank-detail-key { color: #888; }
    .bank-detail-val { font-weight: 600; }
    .bank-detail-btn {
      width: 100%; padding: 14px; background: #0066cc; color: #fff;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
    }

    /* ──────────────────────────────
       알림 화면
    ─────────────────────────────── */
    #screen-notif { background: #f0f4ff; color: #1a1a2e; }
    #screen-notif .app-header { background: #fff; border-bottom: 1px solid #f0f0f0; }
    .notif-today { padding: 6px 20px 4px; font-size: 12px; color: #888; font-weight: 600; }
    .notif-item-card {
      background: #fff; margin: 0 16px 8px; border-radius: 14px; padding: 14px 16px;
      display: flex; gap: 12px; align-items: flex-start; cursor: pointer;
      transition: opacity .1s;
    }
    .notif-item-card:active { opacity: .7; }
    .notif-item-icon { font-size: 24px; }
    .notif-item-content { flex: 1; }
    .notif-item-app { font-size: 11px; color: #888; margin-bottom: 2px; font-weight: 600; }
    .notif-item-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .notif-item-body { font-size: 12px; color: #555; }
    .notif-dot-unread {
      width: 8px; height: 8px; border-radius: 50%; background: #0066cc; flex-shrink: 0; margin-top: 4px;
    }
    .notif-empty-msg { padding: 60px 20px; text-align: center; color: #aaa; font-size: 15px; }
  </style>
</head>
<body>

<div class="phone-scale-wrap" id="phone-scale-wrap">
<div class="phone-body">
  <div class="phone-screen">

    <!-- Dynamic Island -->
    <div class="dynamic-island" id="di">
      <div class="di-notif" id="di-notif">
        <div class="di-icon">💰</div>
        <div class="di-text">
          <div class="di-title" id="di-title">급여 입금</div>
          <div class="di-amount" id="di-amount"></div>
        </div>
      </div>
    </div>

    <!-- 상태바 -->
    <div class="status-bar">
      <div class="status-time" id="status-time">9:41</div>
      <div class="status-icons">
        <span>▐▐▐</span>
        <span>WiFi</span>
        <span>🔋</span>
      </div>
    </div>

    <!-- 홈 인디케이터 -->
    <div class="home-indicator" id="home-indicator" onclick="goHome()"></div>

    <!-- ═══════════════════════════════
         1. 잠금 화면
    ═══════════════════════════════ -->
    <div class="screen active" id="screen-lock">
      <div class="lock-wallpaper"></div>
      <div class="lock-time" id="lock-time">9:41</div>
      <div class="lock-date" id="lock-date">6월 12일 금요일</div>
      <div class="faceid-ring" id="faceid-btn" onclick="doFaceID()">🔐</div>
      <div class="lock-hint">Face ID로 잠금 해제</div>
    </div>

    <!-- ═══════════════════════════════
         2. 홈 화면
    ═══════════════════════════════ -->
    <div class="screen" id="screen-home">
      <div class="home-wallpaper"></div>
      <div class="app-top-pad"></div>
      <div class="home-content" style="padding-top:0">
        <div class="app-grid">
          <div class="app-icon-wrap" onclick="openApp('payfit')">
            <div class="app-icon" style="background:linear-gradient(135deg,#1a73e8,#0d47a1)">
              💰<span class="badge" id="badge-payfit"></span>
            </div>

      <div class="dock">
        <div class="app-icon-wrap" onclick="openApp('payfit')">

        </div>
        <div class="app-icon-wrap" onclick="openApp('bank')">
          <div class="app-icon" style="background:linear-gradient(135deg,#0066cc,#003d7a);width:56px;height:56px">🏦</div>
        </div>
        <div class="app-icon-wrap" onclick="openApp('notif')">
          <div class="app-icon" style="background:linear-gradient(135deg,#ff6b6b,#c0392b);width:56px;height:56px">🔔</div>

    <!-- ═══════════════════════════════

    <div class="screen" id="screen-payfit">

      <div class="payfit-login app-body" id="pf-login">
        <div class="payfit-logo">💰</div>
        <div class="payfit-title">페이핏</div>
        <div class="payfit-subtitle">급여명세서를 확인하세요</div>
        <div class="pf-input-group">
          <label>회사코드</label>
          <input id="pf-code" type="text" placeholder="예: MYJI" autocomplete="off"

          <div class="bank-card-chip">💳</div>
          <div style="font-size:12px;opacity:.7;margin-bottom:12px">로그인이 필요합니다</div>
        </div>

         5. 알림센터

      <div class="app-header">
        <button class="back-btn" onclick="goHome()">⌂</button>
        <div class="app-header-title">알림</div>
        <button class="right-btn" onclick="clearAllNotifs()">지우기</button>
      </div>
      <div class="app-body">
        <div class="notif-today">오늘</div>
        <div id="notif-center-list"></div>
      </div>

  </div><!-- /phone-screen -->
</div><!-- /phone-body -->

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
var PHONE = {
  locked: true,
  currentApp: null,
  employee: null,
  slips: [],
  bankData: null,
  notifications: [],
  pfView: 'login',   // login / main / detail
  bankView: 'main',  // main / detail
  currentSlipId: null,
  currentTxId: null,
};

// ─────────────────────────────────────────
// 시계
// ─────────────────────────────────────────
function updateClock() {
  var now = new Date();
  var h = now.getHours(), m = now.getMinutes();
  var timeStr = h + ':' + (m < 10 ? '0' + m : m);
  document.getElementById('status-time').textContent = timeStr;
  document.getElementById('lock-time').textContent = timeStr;
  var days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  document.getElementById('lock-date').textContent =
    (now.getMonth()+1) + '월 ' + now.getDate() + '일 ' + days[now.getDay()];
}
updateClock();
setInterval(updateClock, 10000);

// ─────────────────────────────────────────
// 화면 전환
// ─────────────────────────────────────────
function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  screens.forEach(function(s) { s.classList.remove('active'); s.style.display = 'none'; });
  var target = document.getElementById(id);
  if (target) { target.style.display = 'flex'; target.classList.add('active'); }
  document.getElementById('home-indicator').style.display = id === 'screen-lock' ? 'none' : 'block';
}

function goHome() {
  PHONE.currentApp = null;
  showScreen('screen-home');
}

function openApp(appName) {
  PHONE.currentApp = appName;
  var screenId = 'screen-' + appName;
  showScreen(screenId);
  if (appName === 'bank') renderBankApp();
  if (appName === 'notif') renderNotifCenter();
}

// ─────────────────────────────────────────
// Face ID 잠금 해제
// ─────────────────────────────────────────
function doFaceID() {
  var btn = document.getElementById('faceid-btn');
  btn.textContent = '👁️';
  btn.classList.add('scanning');
  setTimeout(function() {
    btn.textContent = '✅';
    PHONE.locked = false;
    setTimeout(function() {
      showScreen('screen-home');
      btn.textContent = '🔐';
      btn.classList.remove('scanning');
    }, 400);
  }, 900);
}

// ─────────────────────────────────────────
// Dynamic Island 알림
// ─────────────────────────────────────────
function showDINotif(title, amount) {
  var di = document.getElementById('di');
  document.getElementById('di-title').textContent = title;
  document.getElementById('di-amount').textContent = '+ ' + Number(amount).toLocaleString('ko-KR') + '원';
  di.classList.add('expand');
  // 홈화면이면 뱃지도 업데이트
  updateBadges();
  setTimeout(function() { di.classList.remove('expand'); }, 4000);
}

// ─────────────────────────────────────────
// API 호출
// ─────────────────────────────────────────
async function callApi(method, path, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch('/api/portal' + path, opts);
  var json = await res.json();
  if (!json.success) throw new Error(json.message || '오류가 발생했습니다.');
  return json.data;
}

function won(n) { return '₩ ' + Number(n).toLocaleString('ko-KR'); }

// ─────────────────────────────────────────
// 페이핏 앱
// ─────────────────────────────────────────
async function pfLogin() {
  var code = document.getElementById('pf-code').value.trim().toUpperCase();
  var no   = document.getElementById('pf-no').value.trim();
  var errEl = document.getElementById('pf-error');
  var btn   = document.getElementById('pf-login-btn');
  errEl.style.display = 'none';
  if (!code || !no) { errEl.textContent = '회사코드와 사번을 입력하세요.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '로그인 중...';
  try {
    PHONE.employee = await callApi('POST', '/login', { companyCode: code, employeeNo: no });
    PHONE.slips    = await callApi('GET', '/' + PHONE.employee.employeeId + '/slips');
    PHONE.notifications = await callApi('GET', '/' + PHONE.employee.employeeId + '/notifications');
    // 은행 데이터도 함께 로드
    try { PHONE.bankData = await callApi('GET', '/' + PHONE.employee.employeeId + '/bank-account'); } catch(e) {}
    pfShowView('main');
    updateBadges();
    // 최신 급여가 있고 NEW면 DI 알림
    var latest = PHONE.slips[0];
    if (latest && latest.isNew) {
      setTimeout(function() { showDINotif('급여 입금 알림', latest.netAmount); }, 600);
    }
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '로그인';
  }
}

function pfShowView(view) {
  document.getElementById('pf-login').style.display  = view === 'login'  ? 'flex' : 'none';
  document.getElementById('pf-main').style.display   = view === 'main'   ? 'block' : 'none';
  document.getElementById('pf-detail').style.display = view === 'detail' ? 'block' : 'none';
  PHONE.pfView = view;
  if (view === 'main') {
    document.getElementById('pf-header-title').textContent = '페이핏';
    document.getElementById('pf-header-title').nextElementSibling && null;
    renderPfMain();
  }
  if (view === 'logout') {
    PHONE.employee = null; PHONE.slips = []; PHONE.bankData = null;
    PHONE.notifications = [];
    pfShowView('login');
  }
}

function renderPfMain() {
  var emp = PHONE.employee;
  document.getElementById('pf-name').textContent = emp.fullName + '님';
  document.getElementById('pf-info').textContent = emp.companyName + ' · ' + emp.gradeName + ' ' + emp.currentStep + '호봉';
  renderPfHero();
  renderPfSlipList();
}

function renderPfHero() {
  var el = document.getElementById('pf-hero');
  var s = PHONE.slips[0];
  if (!s) { el.innerHTML = '<div style="text-align:center;opacity:.7;font-size:13px">급여 내역이 없습니다.</div>'; return; }
  el.innerHTML =
    '<div class="pf-hero-label">' + s.year + '년 ' + s.month + '월 급여</div>' +
    '<div class="pf-hero-amount">' + won(s.netAmount) + '</div>' +
    '<div class="pf-hero-sub">실수령액 · 지급일 ' + s.payDate + '</div>' +
    '<button class="pf-hero-btn" onclick="pfOpenSlip(\'' + s.payrollSlipId + '\')">명세 보기 →</button>';
}

function renderPfSlipList() {
  var el = document.getElementById('pf-slip-list');
  if (!PHONE.slips.length) { el.innerHTML = '<div style="text-align:center;color:#aaa;padding:30px;font-size:14px">급여 내역이 없습니다.</div>'; return; }
  el.innerHTML = PHONE.slips.map(function(s) {
    var newBadge = s.isNew ? '<span class="badge-new">NEW</span>' : '';
    return '<div class="pf-slip-item" onclick="pfOpenSlip(\'' + s.payrollSlipId + '\')">' +
      '<div class="pf-slip-icon">💚</div>' +
      '<div class="pf-slip-info">' +
        '<div class="pf-slip-name">' + s.year + '년 ' + s.month + '월 급여' + newBadge + '</div>' +
        '<div class="pf-slip-date">' + s.payDate + ' 지급</div>' +
      '</div>' +
      '<div class="pf-slip-right">' +
        '<div class="pf-slip-net">+' + Number(s.netAmount).toLocaleString('ko-KR') + '원</div>' +
        '<div class="pf-slip-gross">총' + Math.round(s.grossAmount/10000) + '만원</div>' +
      '</div></div>';
  }).join('');
}

async function pfOpenSlip(slipId) {
  PHONE.currentSlipId = slipId;
  document.getElementById('pf-header-title').textContent = '급여명세서';
  try {
    var slip = await callApi('GET', '/' + PHONE.employee.employeeId + '/slips/' + slipId);
    renderPfDetail(slip);
    pfShowView('detail');
  } catch(e) { alert('오류: ' + e.message); }
}

function renderPfDetail(slip) {
  var earnRows = slip.earnings.map(function(i) {
    return '<div class="pf-item-row"><span>' + i.itemName + '</span><span>' + Number(i.amount).toLocaleString('ko-KR') + '</span></div>';
  }).join('');
  var deductRows = slip.deductions.map(function(i) {
    return '<div class="pf-item-row"><span>' + i.itemName + '</span><span class="c-red">-' + Number(i.amount).toLocaleString('ko-KR') + '</span></div>';
  }).join('');
  document.getElementById('pf-detail').innerHTML =
    '<div class="pf-detail-info">' +
      '<div class="pf-detail-emp">' + slip.fullName + '</div>' +
      '<div class="pf-detail-sub">' + slip.gradeName + ' ' + slip.currentStep + '호봉 · ' + slip.orgUnitName + '<br>' + slip.payDate + ' 지급</div>' +
    '</div>' +
    '<div class="pf-net-card">' +
      '<div class="pf-net-label">실수령액</div>' +
      '<div class="pf-net-amount">' + won(slip.netAmount) + '</div>' +
    '</div>' +
    '<div class="pf-items-grid">' +
      '<div class="pf-items-card">' +
        '<div class="pf-items-title">💰 지급</div>' +
        earnRows +
        '<div class="pf-item-total"><span>합계</span><span>' + Number(slip.grossAmount).toLocaleString('ko-KR') + '</span></div>' +
      '</div>' +
      '<div class="pf-items-card">' +
        '<div class="pf-items-title c-red">📉 공제</div>' +
        deductRows +
        '<div class="pf-item-total c-red"><span>합계</span><span>-' + Number(slip.deductionAmount).toLocaleString('ko-KR') + '</span></div>' +
      '</div>' +
    '</div>' +
    '<div class="pf-summary">' +
      '비과세 ' + Number(slip.nonTaxableAmount).toLocaleString('ko-KR') + '원<br>' +
      '과세표준 ' + Number(slip.taxableIncome).toLocaleString('ko-KR') + '원<br>' +
      '총지급 ' + Number(slip.grossAmount).toLocaleString('ko-KR') + '원' +
    '</div>';
}

// ─────────────────────────────────────────
// 핀뱅크 앱
// ─────────────────────────────────────────
function renderBankApp() {
  if (!PHONE.employee || !PHONE.bankData) {
    document.getElementById('bank-account-card').innerHTML =
      '<div class="bank-card-chip">💳</div>' +
      '<div style="font-size:13px;opacity:.8;margin-bottom:8px">페이핏 앱에서 먼저 로그인하세요</div>' +
      '<div style="font-size:11px;opacity:.6">로그인 후 급여 입금 내역을 확인할 수 있습니다.</div>';
    document.getElementById('bank-tx-list').innerHTML = '';
    return;
  }
  var bd = PHONE.bankData;
  var acctDisplay = bd.accountNo !== '계좌 미등록'
    ? bd.accountNo.replace(/(\d{3})(\d+)(\d{6})/, '$1-***-$3')
    : bd.accountNo;

  document.getElementById('bank-account-card').innerHTML =
    '<div class="bank-card-chip">💳</div>' +
    '<div class="bank-card-bank">' + bd.bankName + '</div>' +
    '<div class="bank-card-type">급여계좌</div>' +
    '<div class="bank-card-acct">' + acctDisplay + '</div>' +
    '<div class="bank-card-balance-label">입금 누계</div>' +
    '<div class="bank-card-balance">' + won(bd.balance) + '</div>' +
    '<div class="bank-card-owner">' + bd.ownerName + ' · ' + bd.companyName + '</div>';

  renderBankTxList();
}

function renderBankTxList() {
  var el = document.getElementById('bank-tx-list');
  var bd = PHONE.bankData;
  if (!bd || !bd.transactions.length) {
    el.innerHTML = '<div class="bank-empty">입금 내역이 없습니다.</div>';
    return;
  }
  // 빠른 버튼
  var html = '<div class="bank-quick-btns">' +
    '<div class="bank-quick-btn"><div class="bqb-icon">📋</div>내역</div>' +
    '<div class="bank-quick-btn"><div class="bqb-icon">💸</div>이체</div>' +
    '<div class="bank-quick-btn"><div class="bqb-icon">📊</div>통계</div>' +
    '<div class="bank-quick-btn"><div class="bqb-icon">⚙️</div>관리</div>' +
  '</div>' +
  '<div class="bank-section-title">입출금 내역 <span>전체보기</span></div>';

  bd.transactions.forEach(function(tx, idx) {
    var isFirst = idx === 0;
    var isLast  = idx === bd.transactions.length - 1;
    var isOnly  = bd.transactions.length === 1;
    var br = isOnly ? '14px' : (isFirst ? '14px 14px 0 0' : (isLast ? '0 0 14px 14px' : '0'));
    var newBadge = (isFirst && PHONE.notifications.some(function(n){ return !n.isRead; }))
      ? '<span class="bank-tx-new-badge">NEW</span>' : '';
    var iconClass = isFirst ? 'bank-tx-icon new' : 'bank-tx-icon';
    html += '<div class="bank-tx-item" style="border-radius:' + br + '" onclick="bankOpenTx(\'' + tx.txId + '\')">' +
      '<div class="' + iconClass + '">' + (isFirst ? '🆕' : '💚') + '</div>' +
      '<div class="bank-tx-info">' +
        '<div class="bank-tx-desc">' + tx.description + newBadge + '</div>' +
        '<div class="bank-tx-date">' + tx.date + '</div>' +
      '</div>' +
      '<div class="bank-tx-right">' +
        '<div class="bank-tx-amount">+' + Number(tx.amount).toLocaleString('ko-KR') + '원</div>' +
        '<div class="bank-tx-balance">잔액 ' + Number(tx.balance).toLocaleString('ko-KR') + '원</div>' +
      '</div></div>';
  });
  el.innerHTML = html;
}

async function bankOpenTx(txId) {
  PHONE.currentTxId = txId;
  var tx = PHONE.bankData.transactions.find(function(t){ return t.txId === txId; });
  if (!tx) return;
  // 상세 slip 데이터 있으면 로드
  var slipDetail = null;
  if (tx.payrollSlipId && PHONE.employee) {
    try { slipDetail = await callApi('GET', '/' + PHONE.employee.employeeId + '/slips/' + tx.payrollSlipId); } catch(e) {}
  }
  renderBankTxDetail(tx, slipDetail);
  document.getElementById('bank-main').style.display = 'none';
  document.getElementById('bank-detail').style.display = 'block';
  document.getElementById('bank-header-right').textContent = '← 뒤로';
  document.getElementById('bank-header-right').onclick = function() { bankGoBack(); };
}

function bankGoBack() {
  document.getElementById('bank-main').style.display   = 'block';
  document.getElementById('bank-detail').style.display = 'none';
  document.getElementById('bank-header-right').textContent = '☰';
  document.getElementById('bank-header-right').onclick = null;
}

function renderBankTxDetail(tx, slip) {
  var html =
    '<div class="bank-detail-amount-card">' +
      '<div class="bank-detail-type">💚 급여 입금</div>' +
      '<div class="bank-detail-amount">+' + Number(tx.amount).toLocaleString('ko-KR') + '원</div>' +
    '</div>' +
    '<div class="bank-detail-row">' +
      '<div class="bank-detail-item"><span class="bank-detail-key">거래일시</span><span class="bank-detail-val">' + tx.date + '</span></div>' +
      '<div class="bank-detail-item"><span class="bank-detail-key">거래처</span><span class="bank-detail-val">' + tx.description + '</span></div>' +
      '<div class="bank-detail-item"><span class="bank-detail-key">입금금액</span><span class="bank-detail-val" style="color:#0066cc">+' + Number(tx.amount).toLocaleString('ko-KR') + '원</span></div>' +
      '<div class="bank-detail-item"><span class="bank-detail-key">거래후잔액</span><span class="bank-detail-val">' + Number(tx.balance).toLocaleString('ko-KR') + '원</span></div>' +
      '<div class="bank-detail-item"><span class="bank-detail-key">계좌번호</span><span class="bank-detail-val">' + (PHONE.bankData.accountNo || '—') + '</span></div>' +
    '</div>';

  if (slip) {
    html += '<div class="bank-detail-row">' +
      '<div style="font-size:13px;font-weight:700;margin-bottom:10px">💰 급여 상세 내역</div>' +
      slip.earnings.map(function(i){
        return '<div class="bank-detail-item"><span class="bank-detail-key">' + i.itemName + '</span><span class="bank-detail-val">' + Number(i.amount).toLocaleString('ko-KR') + '원</span></div>';
      }).join('') +
      '<div class="bank-detail-item" style="border-top:2px solid #f0f0f0;margin-top:4px"><span class="bank-detail-key">총 지급</span><span class="bank-detail-val">' + Number(slip.grossAmount).toLocaleString('ko-KR') + '원</span></div>' +
      '<div class="bank-detail-item"><span class="bank-detail-key">공제 합계</span><span class="bank-detail-val" style="color:#e74c3c">-' + Number(slip.deductionAmount).toLocaleString('ko-KR') + '원</span></div>' +
      '<div class="bank-detail-item"><span class="bank-detail-key">실수령액</span><span class="bank-detail-val" style="color:#0066cc;font-size:15px">+' + Number(slip.netAmount).toLocaleString('ko-KR') + '원</span></div>' +
    '</div>';
    html += '<button class="bank-detail-btn" onclick="bankViewSlip(\'' + slip.payrollSlipId + '\')">급여명세서 보기</button>';
  }
  document.getElementById('bank-detail').innerHTML = html;
}

function bankViewSlip(slipId) {
  // 페이핏 앱으로 전환하여 명세서 보기
  openApp('payfit');
  setTimeout(function() {
    if (PHONE.employee) pfOpenSlip(slipId);
  }, 400);
}

// ─────────────────────────────────────────
// 알림 센터
// ─────────────────────────────────────────
function renderNotifCenter() {
  var el = document.getElementById('notif-center-list');
  if (!PHONE.notifications.length) {
    el.innerHTML = '<div class="notif-empty-msg">알림이 없습니다.</div>';
    return;
  }
  el.innerHTML = PHONE.notifications.map(function(n) {
    var unread = !n.isRead;
    return '<div class="notif-item-card" onclick="notifClick(\'' + (n.payrollSlipId||'') + '\')">' +
      '<div class="notif-item-icon">💰</div>' +
      '<div class="notif-item-content">' +
        '<div class="notif-item-app">페이핏 급여포털</div>' +
        '<div class="notif-item-title">' + n.title + '</div>' +
        (n.body ? '<div class="notif-item-body">' + n.body + '</div>' : '') +
      '</div>' +
      (unread ? '<div class="notif-dot-unread"></div>' : '') +
    '</div>';
  }).join('');
}

function notifClick(slipId) {
  if (slipId && PHONE.employee) {
    openApp('payfit');
    setTimeout(function() { pfOpenSlip(slipId); }, 400);
  }
}

function clearAllNotifs() {
  if (PHONE.employee) {
    callApi('POST', '/' + PHONE.employee.employeeId + '/notifications/read-all')
      .then(function() {
        PHONE.notifications.forEach(function(n) { n.isRead = true; });
        updateBadges();
        renderNotifCenter();
      });
  }
}

// ─────────────────────────────────────────
// 뱃지 업데이트
// ─────────────────────────────────────────
function updateBadges() {
  var unread = PHONE.notifications.filter(function(n){ return !n.isRead; }).length;
  var newSlips = PHONE.slips.filter(function(s){ return s.isNew; }).length;

  setBadge('badge-payfit', newSlips);
  setBadge('badge-bank', newSlips > 0 ? '!' : 0);
  setBadge('badge-notif', unread);
}
function setBadge(id, cnt) {
  var el = document.getElementById(id);
  if (!el) return;
  if (cnt && cnt !== 0) {
    el.textContent = typeof cnt === 'number' ? cnt : cnt;
    el.style.display = 'flex';
  } else {
    el.style.display = 'none';
  }
}

// ─────────────────────────────────────────
// 폴링: 새 알림 체크 (30초마다)
// ─────────────────────────────────────────
setInterval(function() {
  if (!PHONE.employee) return;
  callApi('GET', '/' + PHONE.employee.employeeId + '/notifications')
    .then(function(notifs) {
      var prevUnread = PHONE.notifications.filter(function(n){ return !n.isRead; }).length;
      PHONE.notifications = notifs;
      var newUnread = notifs.filter(function(n){ return !n.isRead; }).length;
      if (newUnread > prevUnread) {
        var latest = notifs.find(function(n){ return !n.isRead; });
        if (latest) showDINotif('새 알림', 0);
      }
      updateBadges();
    }).catch(function(){});
}, 30000);

// ─────────────────────────────────────────
// 뷰포트에 맞게 폰 자동 스케일
// ─────────────────────────────────────────
function fitPhone() {
  var PHONE_W = 390 + 8;  // 본체 + 측면버튼 여유
  var PHONE_H = 844;
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var scale = Math.min(
    (vw * 0.96) / PHONE_W,
    (vh * 0.96) / PHONE_H
  );
  if (scale > 1) scale = 1;
  var wrap = document.getElementById('phone-scale-wrap');
  wrap.style.transform = 'scale(' + scale + ')';
  wrap.style.transformOrigin = 'center center';
  // 래퍼 크기를 실제 크기로 고정 (스케일 후 레이아웃 영향 방지)
  wrap.style.width  = PHONE_W + 'px';
  wrap.style.height = PHONE_H + 'px';
}
fitPhone();
window.addEventListener('resize', fitPhone);

// 초기화
showScreen('screen-lock');
</script>
</body>
</html>
