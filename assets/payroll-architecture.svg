<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">PayFit ERP payroll architecture</title>
  <desc id="desc">회사 기준정보, 근태, 급여 계산, 공제, 승인, 명세서, 포털까지 이어지는 PayFit ERP 업무 흐름</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1280" height="420" rx="24" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="190" fill="#2563eb" opacity="0.12"/>
  <circle cx="120" cy="376" r="190" fill="#14b8a6" opacity="0.10"/>

  <text x="64" y="58" fill="#f8fafc" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="32" font-weight="760">PayFit ERP Architecture</text>
  <text x="64" y="90" fill="#94a3b8" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="16">기준정보에서 급여 계산, 승인, 명세서, 포털까지 이어지는 HR·Payroll 도메인 흐름</text>
  <rect x="64" y="114" width="1152" height="3" rx="1.5" fill="url(#accent)"/>

  <g transform="translate(64 160)" filter="url(#shadow)" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif">
    <g>
      <rect width="156" height="82" rx="18" fill="#111827" stroke="#64748b"/>
      <text x="42" y="36" fill="#f8fafc" font-size="18" font-weight="750">Master</text>
      <text x="24" y="61" fill="#cbd5e1" font-size="13">회사 · 조직 · 직원</text>
    </g>

    <g transform="translate(198 0)">
      <rect width="156" height="82" rx="18" fill="#111827" stroke="#0ea5e9"/>
      <text x="26" y="36" fill="#e0f2fe" font-size="18" font-weight="750">Attendance</text>
      <text x="26" y="61" fill="#7dd3fc" font-size="13">휴가 · 연장근무</text>
    </g>

    <g transform="translate(396 0)">
      <rect width="156" height="82" rx="18" fill="#111827" stroke="#7c3aed"/>
      <text x="42" y="36" fill="#ede9fe" font-size="18" font-weight="750">Payroll</text>
      <text x="31" y="61" fill="#c4b5fd" font-size="13">실행 · 계산</text>
    </g>

    <g transform="translate(594 0)">
      <rect width="156" height="82" rx="18" fill="#111827" stroke="#f59e0b"/>
      <text x="35" y="36" fill="#fef3c7" font-size="18" font-weight="750">Deduction</text>
      <text x="25" y="61" fill="#fde68a" font-size="13">4대보험 · 세금</text>
    </g>

    <g transform="translate(792 0)">
      <rect width="156" height="82" rx="18" fill="#111827" stroke="#22c55e"/>
      <text x="42" y="36" fill="#dcfce7" font-size="18" font-weight="750">Approve</text>
      <text x="34" y="61" fill="#86efac" font-size="13">검토 · 지급</text>
    </g>

    <g transform="translate(990 0)">
      <rect width="156" height="82" rx="18" fill="#111827" stroke="#38bdf8"/>
      <text x="48" y="36" fill="#e0f2fe" font-size="18" font-weight="750">Portal</text>
      <text x="26" y="61" fill="#7dd3fc" font-size="13">명세서 · 리포트</text>
    </g>

    <path d="M166 41 H190" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M364 41 H388" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M562 41 H586" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M760 41 H784" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M958 41 H982" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowHead)"/>
  </g>

  <g transform="translate(64 300)" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif">
    <rect width="1152" height="62" rx="18" fill="#0b1120" stroke="#1e293b"/>
    <text x="28" y="38" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">domain checks</text>
    <text x="160" y="38" fill="#cbd5e1" font-size="15">월할 계산 · 비과세 한도 · 법정 공제 · 승인 상태 전이 · 명세서 발송 · 리포트 생성</text>
  </g>
</svg>
